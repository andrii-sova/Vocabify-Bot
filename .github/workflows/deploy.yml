name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Write appsettings.json
        run: echo '${{ secrets.APP_SETTINGS }}' > appsettings.json

      - name: Publish application
        run: dotnet publish KnowlBot.csproj -c Release -r linux-x64 --self-contained false -o ./publish

      - name: Copy files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          source: "./publish/*"
          target: "~/telegram-bot"
          strip_components: 1

      - name: Restart bot on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            sudo systemctl restart knowlbot
            sleep 2
            systemctl is-active --quiet knowlbot && echo "Bot successfully deployed" || (echo "Bot failed to start"; exit 1)